{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | HOME</title>
    <link rel="stylesheet" href="{% static 'css/studentregistration.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        footer {
            text-align: center;
            padding: 20px;
            background-color: #f1f1f1;
            border-top: 1px solid #ccc;
            margin-top: auto;
        }

        .navbar {
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
        }

        .navbar img {
            width: 50px;
            margin-right: 20px;
        }

        .navbar-title {
            font-size: 24px;
            margin: 0;
        }

        .navbar .home,
        .navbar .logout {
            margin-left: auto;
            text-decoration: none;
            color: #007bff;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .navbar .home {
            background-color: #28a745;
            display: flex;
            align-items: center;
        }

        .navbar .home:hover {
            background-color: #218838;
        }

        .navbar .logout {
            display: flex;
            align-items: center;
            background-color: #e2e6ea;
        }

        .navbar .logout:hover {
            background-color: #d6d8db;
        }

        .navbar .home i,
        .navbar .logout i {
            margin-right: 8px;
        }

        .welcome-message {
            margin-left: 20px;
            padding-left: 20px;
        }

        .button-container {
            display: flex;
            justify-content: space-evenly;
            margin-top: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .button {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 30px 25px;
            width: 150px;
            height: 150px;
            box-sizing: border-box;
            margin: 10px;
            transition: background-color 0.3s, box-shadow 0.3s, transform 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .button:hover {
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }

        .button i {
            font-size: 30px;
            margin-bottom: 12px;
        }

        .button img {
            width: 40px;
            height: 40px;
            margin-bottom: 12px;
        }

        .navbar .home i,
        .navbar .logout i {
            margin-right: 8px;
        }

        .button-container a {
            flex: 1 0 200px;
            display: flex;
            justify-content: center;
        }

        /* Specific button styles */
        .home-button {
            background-color: #28a745;
        }

        .home-button:hover {
            background-color: #218838;
        }

        .slot-details {
            background-color: #007bff;
        }

        .slot-details:hover {
            background-color: #0056b3;
        }

        .live-tracking {
            background-color: #ff5733;
        }

        .live-tracking:hover {
            background-color: #c70039;
        }

        .highlighted-email {
            color: #007bff;
            font-weight: bold;
        }

        h2 {
            font-size: 30px;
            color: #333;
            margin-bottom: 40px;
        }

        .time-display {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            margin-left: 20px;
        }

    </style>
</head>

<body>
    <div class="navbar">
        <img src="{% static 'img/headicon.gif' %}" alt="Smart Bus Pass" class="navbar-icon">
        <h2 class="navbar-title"><a href="#">Automated Parking</a></h2>
        <a href="{%url 'AdminHome'%}" class="home">
            <i class="fas fa-home"></i> HOME
        </a>
        <div class="welcome-message">
            {% if user_name %}
                <span class="highlighted-email">Welcome, {{ user_name }}!</span><br>
            {% else %}
                <span>Please log in</span>
            {% endif %}
        </div>
        <div id="time" class="time-display"></div>
        
        <a href="{%url 'adminlogout'%}" class="logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <div class="container mt-4" style="text-align: center;">
        <h2>Welcome To Admin Home Page</h2>
        <div class="button-container">
            <a href="{%url 'AdminHome'%}" class="button home-button">
                <img src="{% static 'img/7733361.png' %}" alt="Home">
                Home
            </a>

            <a href="{% url 'hopitalparking' %}" class="button slot-details">
                <i class="fas fa-car"></i>
                Slot Details
            </a>

            <a href="{% url 'hospital_parking_history' %}" class="button live-tracking">
                <i class="fas fa-map-marker-alt"></i>
                Live Parked Tracking
            </a>
        </div>
    </div>

    <footer class="footer">
        <span>&copy; Automated Vehicle Parking. All rights reserved.</span>
    </footer>

    <script>
        function updateIST() {
            var now = new Date();

            var options = {
                timeZone: 'Asia/Kolkata',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };

            var istTime = new Intl.DateTimeFormat('en-GB', options).format(now);
            document.getElementById('time').textContent = istTime + ' [IST]';
        }

        setInterval(updateIST, 1000);
        updateIST();
    </script>
</body>

</html>
