{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | LOGIN</title>
    <link rel="stylesheet" href="{% static 'css/studentregistration.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Additional styles */
        .highlighted-email {
            color: #007bff;
            font-weight: bold;
            margin-left: auto;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #f1f1f1;
            border-top: 1px solid #ccc;
            margin-top: auto;
        }

        .navbar {
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
        }

        .navbar img {
            width: 50px;
            margin-right: 20px;
        }

        .navbar-title {
            font-size: 24px;
            margin: 0;
        }

        .navbar .home,
        .navbar .logout,
        .navbar .login,
        .navbar .admin-login {
            margin-left: auto;
            text-decoration: none;
            color: #007bff;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .navbar .home {
            background-color: #28a745;
            display: flex;
            align-items: center;
        }

        .navbar .home:hover {
            background-color: #218838;
        }

        .navbar .logout {
            display: flex;
            align-items: center;
            background-color: #e2e6ea;
        }

        .navbar .logout:hover,
        .navbar .login:hover,
        .navbar .admin-login:hover {
            background-color: #d6d8db;
        }

        .navbar .home i,
        .navbar .logout i {
            margin-right: 8px;
        }

        .welcome-message {
            margin-left: 20px;
            padding-left: 20px;
        }

        .button-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .button {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #333;
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            width: 120px;
            margin: 10px;
            transition: background-color 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .button:hover {
            background-color: #e2e6ea;
        }

        .button img {
            width: 40px;
            margin-bottom: 10px;
        }

        .login-form {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow: 20px 20px 50px rgba(0, 0, 0, 0.1), -20px -20px 50px rgba(255, 255, 255, 1);
            font-family: 'Arial', sans-serif;
        }

        .login-form h3 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
            color: #333;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .login-form .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        .login-form input {
            width: 100%;
            padding: 12px 20px;
            padding-left: 45px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #f9f9f9;
            font-size: 18px;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.1), inset -4px -4px 8px rgba(255, 255, 255, 0.7);
        }

        .login-form .input-container i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #007bff;
            font-size: 18px;
        }

        .login-form .input-container .show-password {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #007bff;
            font-size: 18px;
        }

        .login-form button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(145deg, #007bff, #0056b3);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2), -4px -4px 8px rgba(255, 255, 255, 0.2);
        }

        .login-form button:hover {
            background: linear-gradient(145deg, #0056b3, #004494);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.3), -6px -6px 12px rgba(255, 255, 255, 0.3);
        }

        .login-form input:focus {
            outline: none;
            border: 1px solid #007bff;
            box-shadow: 0px 0px 5px rgba(0, 123, 255, 0.5);
        }

        /* Styling the message alerts */
        .alert {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease-in-out;
            position: relative;
            /* To allow positioning of the close button */
        }

        .alert-success {
            background-color: #28a745;
            border: 1px solid #218838;
        }

        .alert-danger {
            background-color: #dc3545;
            /* Red color for error messages */
            border: 1px solid #c82333;
        }

        .alert-warning {
            background-color: #ffc107;
            border: 1px solid #e0a800;
        }

        .alert-info {
            background-color: #17a2b8;
            border: 1px solid #117a8b;
        }

        .alert-close {
            position: absolute;
            top: 50%;
            right: 10px;
            /* Position the close button to the right */
            transform: translateY(-50%);
            /* Vertically center the close button */
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <img src="{% static 'img/headicon.gif' %}" alt="Smart Bus Pass" class="navbar-icon">
        <h2 class="navbar-title"><a href="#">Automated Parking</a></h2>
        <a href="{% url 'basefunction' %}" class="home">
            <i class="fas fa-home"></i> Back to Home
        </a>
        <a href="{% url 'AdminLogin' %}" class="logout">
            <i class="fas fa-sign-out-alt"></i> Admin login
        </a>
    </div>

    <!-- Display Messages -->
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
            <span class="alert-close" onclick="this.parentElement.style.display='none';">&times;</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Login Form -->
    <div class="login-form">
        <h3>ADMIN LOGIN</h3>
        <form action="{% url 'AdminLoginCheck' %}" method="POST">
            {% csrf_token %}
            <div class="input-container">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="loginid" placeholder="Enter your username" required>
            </div>

            <div class="input-container">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="pswd" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

    <footer class="footer">
        <span>&copy; Automated Vehicle Parking. All rights reserved.</span>
    </footer>

</body>

</html>
