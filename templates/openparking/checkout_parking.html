{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chekout | HOME</title>
    <link rel="stylesheet" href="{% static 'css/studentregistration.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        footer {
            text-align: center;
            padding: 20px;
            background-color: #f1f1f1;
            border-top: 1px solid #ccc;
            margin-top: auto;
        }

        .navbar {
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
        }

        .navbar img {
            width: 50px;
            margin-right: 20px;
        }

        .navbar-title {
            font-size: 24px;
            margin: 0;
        }

        .navbar .home,
        .navbar .logout {
            margin-left: auto;
            text-decoration: none;
            color: #007bff;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .navbar .home {
            background-color: #28a745;
            display: flex;
            align-items: center;
        }

        .navbar .home:hover {
            background-color: #218838;
        }

        .navbar .logout {
            display: flex;
            align-items: center;
            background-color: #e2e6ea;
        }

        .navbar .logout:hover {
            background-color: #d6d8db;
        }

        .navbar .home i,
        .navbar .logout i {
            margin-right: 8px;
        }

        .welcome-message {
            margin-left: 20px;
            padding-left: 20px;
        }

        .time-display {
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
        }

        h2 {
            font-size: 30px;
            color: #333;
            margin-bottom: 40px;
        }

        /* Form Styling */
        .form-container {
            margin-top: 50px;
        }

        .form-label {
            font-weight: bold;
        }

        .form-select,
        .form-control {
            width: 100%;
        }

        /* Button styling */
        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border-color: #007bff;
            font-size: 16px;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        /* Container Styling */
        .container.mt-5 {
            margin-top: 40px;
        }

        /* Navbar Time Display */
        .time-display {
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <img src="{% static 'img/headicon.gif' %}" alt="Smart Bus Pass" class="navbar-icon">
        <h2 class="navbar-title"><a href="#">Automated Parking</a></h2>

        <div class="welcome-message">
            {% if request.session.name %}
            <span class="highlighted-email">Welcome, {{ request.session.name }}!</span><br>
            <span>{{ request.session.email }}</span>
            {% else %}
            <span>Please log in</span>
            {% endif %}
        </div>

        <!-- Display the current time here -->
        <div id="time" class="time-display"></div>

        <a href="{% url 'adminlogout' %}" class="logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <br>
    <div class="container mt-4" style="text-align: center;">
      
        <div class="container mt-5">
            <h1 class="text-center">Checkout Parking</h1>
            <form method="POST" action="">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="search_type" class="form-label">Search By</label>
                    <select id="search_type" name="search_type" class="form-select" required>
                        <option value="slot_id">Slot ID</option>
                        <option value="vehicle_number">Vehicle Number</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="search_value" class="form-label">Enter Value</label>
                    <input type="text" id="search_value" name="search_value" class="form-control" placeholder="Enter Slot ID or Vehicle Number" required>
                </div>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <span>&copy; Automated Vehicle Parking. All rights reserved.</span>
    </footer>

    <script>
        function updateIST() {
            var now = new Date();

            // Convert current time to Indian Standard Time (IST)
            var options = {
                timeZone: 'Asia/Kolkata', // IST time zone
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };

            var istTime = new Intl.DateTimeFormat('en-GB', options).format(now);
            document.getElementById('time').textContent = istTime + ' [IST]';
        }

        // Update time every second
        setInterval(updateIST, 1000);
        updateIST(); //
    </script>
</body>

</html>
