<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome (Latest version) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .star-rating {
            font-size: 30px;
            color: gray;
            cursor: pointer;
        }
        .star-rating .fa-solid {
            color: gold;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">We Value Your Feedback!</h2>
        <p class="text-center">Tell us about your experience with our service.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="mt-4">
            {% csrf_token %}
            
            <!-- Star Rating System -->
            <div class="mb-3">
                <label class="form-label">Rating</label>
                <div id="star-rating" class="star-rating">
                    <i class="fa-regular fa-star" data-value="1"></i>
                    <i class="fa-regular fa-star" data-value="2"></i>
                    <i class="fa-regular fa-star" data-value="3"></i>
                    <i class="fa-regular fa-star" data-value="4"></i>
                    <i class="fa-regular fa-star" data-value="5"></i>
                </div>
                <!-- Hidden Input to Store Rating Value -->
                <input type="hidden" name="rating" id="rating-value" value="0">
            </div>

            <div class="mb-3">
                <label class="form-label">Comments</label>
                {{ form.comment }}
            </div>
            
            <button type="submit" class="btn btn-primary">Submit Feedback</button>
            <a href="{% url 'userhome' %}" class="btn btn-secondary">Skip & Go to Dashboard</a>
        </form>
    </div>

    <script>
        const stars = document.querySelectorAll('.star-rating i');
        const ratingInput = document.getElementById('rating-value');

        stars.forEach(star => {
            star.addEventListener('click', function() {
                let rating = this.getAttribute('data-value');
                ratingInput.value = rating;

                // Reset all stars to empty
                stars.forEach(s => {
                    s.classList.remove('fa-solid');
                    s.classList.add('fa-regular');
                });

                // Highlight selected stars
                for (let i = 0; i < rating; i++) {
                    stars[i].classList.remove('fa-regular');
                    stars[i].classList.add('fa-solid');
                }
            });
        });
    </script>
</body>
</html>
